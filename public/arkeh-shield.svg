<svg width="256" height="280" viewBox="0 0 200 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ak-metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#163034"/>
      <stop offset="55%" stop-color="#0c1e21"/>
      <stop offset="100%" stop-color="#06141700"/>
    </linearGradient>
    <linearGradient id="ak-bevel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="50%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0d6e66"/>
    </linearGradient>
    <radialGradient id="ak-core" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="rgba(186,250,237,.55)"/>
      <stop offset="60%" stop-color="rgba(45,212,191,.10)"/>
      <stop offset="100%" stop-color="rgba(45,212,191,0)"/>
    </radialGradient>
    <filter id="ak-neon">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ak-neon-strong">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer shield body (metallic gradient + bright bevel border) -->
  <path d="M 30 22 L 170 22 L 170 92 C 170 138, 144 174, 100 206 C 56 174, 30 138, 30 92 Z"
        fill="url(#ak-metal)" stroke="url(#ak-bevel)" stroke-width="3" filter="url(#ak-neon)"/>

  <!-- Inner bevel line -->
  <path d="M 38 30 L 162 30 L 162 91 C 162 133, 140 165, 100 195 C 60 165, 38 133, 38 91 Z"
        fill="none" stroke="rgba(94,234,212,.55)" stroke-width="1.4"/>
  <path d="M 43 35 L 157 35 L 157 90 C 157 130, 138 159, 100 188 C 62 159, 43 130, 43 90 Z"
        fill="none" stroke="rgba(94,234,212,.25)" stroke-width="0.9"/>

  <!-- Rivets along inside edge -->
  <g fill="#9aa9b3" stroke="#1f3a3f" stroke-width="0.4">
    <circle cx="48"  cy="40" r="1.7"/>
    <circle cx="64"  cy="40" r="1.7"/>
    <circle cx="82"  cy="40" r="1.7"/>
    <circle cx="100" cy="40" r="1.7"/>
    <circle cx="118" cy="40" r="1.7"/>
    <circle cx="136" cy="40" r="1.7"/>
    <circle cx="152" cy="40" r="1.7"/>
    <circle cx="48"  cy="60" r="1.7"/>
    <circle cx="48"  cy="82" r="1.7"/>
    <circle cx="50"  cy="106" r="1.7"/>
    <circle cx="56"  cy="130" r="1.7"/>
    <circle cx="68"  cy="155" r="1.7"/>
    <circle cx="84"  cy="175" r="1.7"/>
    <circle cx="152" cy="60" r="1.7"/>
    <circle cx="152" cy="82" r="1.7"/>
    <circle cx="150" cy="106" r="1.7"/>
    <circle cx="144" cy="130" r="1.7"/>
    <circle cx="132" cy="155" r="1.7"/>
    <circle cx="116" cy="175" r="1.7"/>
    <circle cx="100" cy="183" r="1.7"/>
  </g>

  <!-- Soft center glow behind cross -->
  <ellipse cx="100" cy="108" rx="46" ry="56" fill="url(#ak-core)"/>

  <!-- Central neon cross -->
  <g filter="url(#ak-neon-strong)">
    <!-- vertical bar (outer halo) -->
    <rect x="91"  y="44" width="18" height="138" rx="2" fill="rgba(94,234,212,.30)"/>
    <!-- vertical bar (white core) -->
    <rect x="94"  y="46" width="12" height="134" rx="1.5" fill="#bafaed"/>
    <rect x="96"  y="48" width="8"  height="130" rx="1"   fill="#5eead4"/>
    <!-- horizontal bar (outer halo) -->
    <rect x="50"  y="93" width="100" height="18" rx="2" fill="rgba(94,234,212,.30)"/>
    <!-- horizontal bar (core) -->
    <rect x="52"  y="95" width="96"  height="14" rx="1.5" fill="#bafaed"/>
    <rect x="54"  y="97" width="92"  height="10" rx="1"   fill="#5eead4"/>
  </g>

  <!-- Four cross-pattée crusader crosses in quadrants -->
  <g stroke="#5eead4" stroke-width="0.7" filter="url(#ak-neon)">
    <g transform="translate(70, 70)" fill="#0c2226">
      <path d="M -3,-9 L 3,-9 L 2,-3 L 9,-3 L 9,3 L 2,3 L 3,9 L -3,9 L -2,3 L -9,3 L -9,-3 L -2,-3 Z"/>
    </g>
    <g transform="translate(130, 70)" fill="#0c2226">
      <path d="M -3,-9 L 3,-9 L 2,-3 L 9,-3 L 9,3 L 2,3 L 3,9 L -3,9 L -2,3 L -9,3 L -9,-3 L -2,-3 Z"/>
    </g>
    <g transform="translate(70, 142)" fill="#0c2226">
      <path d="M -3,-9 L 3,-9 L 2,-3 L 9,-3 L 9,3 L 2,3 L 3,9 L -3,9 L -2,3 L -9,3 L -9,-3 L -2,-3 Z"/>
    </g>
    <g transform="translate(130, 142)" fill="#0c2226">
      <path d="M -3,-9 L 3,-9 L 2,-3 L 9,-3 L 9,3 L 2,3 L 3,9 L -3,9 L -2,3 L -9,3 L -9,-3 L -2,-3 Z"/>
    </g>
  </g>
</svg>
