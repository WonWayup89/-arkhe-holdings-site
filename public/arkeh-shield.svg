<svg width="220" height="240" viewBox="0 0 220 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <filter id="s-neon-xs" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="s-neon-sm" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="s-neon-md" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="s-neon-lg" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="s-clip">
      <path d="M 28 12 L 192 12 L 192 124 C 192 166 155 196 110 216 C 65 196 28 166 28 124 Z"/>
    </clipPath>

    <linearGradient id="s-metal" x1="110" y1="12" x2="110" y2="216" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#18363e"/>
      <stop offset="45%"  stop-color="#0d1f26"/>
      <stop offset="100%" stop-color="#050d10"/>
    </linearGradient>

    <radialGradient id="s-core" cx="110" cy="114" r="62" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="rgba(186,250,237,0.50)"/>
      <stop offset="50%"  stop-color="rgba(45,212,191,0.12)"/>
      <stop offset="100%" stop-color="rgba(45,212,191,0)"/>
    </radialGradient>

    <radialGradient id="s-apex" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="rgba(255,255,255,1)"/>
      <stop offset="50%"  stop-color="rgba(186,250,237,0.7)"/>
      <stop offset="100%" stop-color="rgba(94,234,212,0)"/>
    </radialGradient>

  </defs>

  <!-- Shield body -->
  <path
    d="M 28 12 L 192 12 L 192 124 C 192 166 155 196 110 216 C 65 196 28 166 28 124 Z"
    fill="url(#s-metal)"
  />

  <!-- Clipped interior -->
  <g clip-path="url(#s-clip)">

    <!-- Core glow -->
    <ellipse cx="110" cy="114" rx="55" ry="62" fill="url(#s-core)"/>

    <!-- Central neon cross -->
    <g filter="url(#s-neon-md)">
      <rect x="103" y="12"  width="14" height="204" rx="2" fill="rgba(94,234,212,0.25)"/>
      <rect x="105" y="12"  width="10" height="204" rx="1.5" fill="#bafaed"/>
      <rect x="107" y="12"  width="6"  height="204" rx="1" fill="#5eead4"/>
      <rect x="28"  y="87"  width="164" height="14" rx="2" fill="rgba(94,234,212,0.25)"/>
      <rect x="28"  y="89"  width="164" height="10" rx="1.5" fill="#bafaed"/>
      <rect x="28"  y="91"  width="164" height="6"  rx="1" fill="#5eead4"/>
    </g>

    <!-- Top-left crosses (teal) -->
    <g fill="rgba(8,20,30,0.95)" stroke="rgba(45,212,191,0.85)" stroke-width="0.9" filter="url(#s-neon-xs)">
      <g transform="translate(65,48)">
        <path d="M -5,-15 L 5,-15 L 3.5,-5 L 15,-5 L 15,5 L 3.5,5 L 5,15 L -5,15 L -3.5,5 L -15,5 L -15,-5 L -3.5,-5 Z"/>
      </g>
      <g transform="translate(44,76)" stroke="rgba(45,212,191,0.60)" stroke-width="0.7">
        <path d="M -4,-11 L 4,-11 L 2.5,-4 L 11,-4 L 11,4 L 2.5,4 L 4,11 L -4,11 L -2.5,4 L -11,4 L -11,-4 L -2.5,-4 Z"/>
      </g>
    </g>

    <!-- Top-right crosses (silver/gold) -->
    <g fill="rgba(10,22,32,0.95)" stroke="rgba(180,200,230,0.70)" stroke-width="0.9" filter="url(#s-neon-xs)">
      <g transform="translate(155,48)">
        <path d="M -5,-15 L 5,-15 L 3.5,-5 L 15,-5 L 15,5 L 3.5,5 L 5,15 L -5,15 L -3.5,5 L -15,5 L -15,-5 L -3.5,-5 Z"/>
      </g>
      <g transform="translate(174,76)" stroke="rgba(200,175,100,0.60)" stroke-width="0.7">
        <path d="M -4,-11 L 4,-11 L 2.5,-4 L 11,-4 L 11,4 L 2.5,4 L 4,11 L -4,11 L -2.5,4 L -11,4 L -11,-4 L -2.5,-4 Z"/>
      </g>
    </g>

    <!-- Bottom-left crosses (teal) -->
    <g fill="rgba(8,20,30,0.95)" stroke="rgba(45,212,191,0.70)" stroke-width="0.9" filter="url(#s-neon-xs)">
      <g transform="translate(62,120)">
        <path d="M -5,-15 L 5,-15 L 3.5,-5 L 15,-5 L 15,5 L 3.5,5 L 5,15 L -5,15 L -3.5,5 L -15,5 L -15,-5 L -3.5,-5 Z"/>
      </g>
      <g transform="translate(46,158)" stroke="rgba(45,212,191,0.45)" stroke-width="0.7">
        <path d="M -4,-11 L 4,-11 L 2.5,-4 L 11,-4 L 11,4 L 2.5,4 L 4,11 L -4,11 L -2.5,4 L -11,4 L -11,-4 L -2.5,-4 Z"/>
      </g>
    </g>

    <!-- Bottom-right crosses (silver/gold) -->
    <g fill="rgba(10,22,32,0.95)" stroke="rgba(180,200,230,0.60)" stroke-width="0.9" filter="url(#s-neon-xs)">
      <g transform="translate(158,120)">
        <path d="M -5,-15 L 5,-15 L 3.5,-5 L 15,-5 L 15,5 L 3.5,5 L 5,15 L -5,15 L -3.5,5 L -15,5 L -15,-5 L -3.5,-5 Z"/>
      </g>
      <g transform="translate(172,158)" stroke="rgba(200,175,100,0.55)" stroke-width="0.7">
        <path d="M -4,-11 L 4,-11 L 2.5,-4 L 11,-4 L 11,4 L 2.5,4 L 4,11 L -4,11 L -2.5,4 L -11,4 L -11,-4 L -2.5,-4 Z"/>
      </g>
    </g>

  </g><!-- end clip -->

  <!-- Shield border — layered neon glow -->
  <path
    d="M 28 12 L 192 12 L 192 124 C 192 166 155 196 110 216 C 65 196 28 166 28 124 Z"
    fill="none" stroke="rgba(94,234,212,0.20)" stroke-width="14"
    filter="url(#s-neon-lg)"
  />
  <path
    d="M 28 12 L 192 12 L 192 124 C 192 166 155 196 110 216 C 65 196 28 166 28 124 Z"
    fill="none" stroke="rgba(94,234,212,0.60)" stroke-width="4"
    filter="url(#s-neon-sm)"
  />
  <path
    d="M 28 12 L 192 12 L 192 124 C 192 166 155 196 110 216 C 65 196 28 166 28 124 Z"
    fill="none" stroke="rgba(186,250,237,0.95)" stroke-width="2"
  />

  <!-- Inner bevel -->
  <path
    d="M 36 20 L 184 20 L 184 123 C 184 160 152 187 110 205 C 68 187 36 160 36 123 Z"
    fill="none" stroke="rgba(94,234,212,0.25)" stroke-width="1"
  />

  <!-- Rivets -->
  <g fill="#8ab5c0" stroke="#1a3840" stroke-width="0.4">
    <circle cx="42"  cy="24" r="2.2"/>
    <circle cx="70"  cy="19" r="2.2"/>
    <circle cx="110" cy="17" r="2.2"/>
    <circle cx="150" cy="19" r="2.2"/>
    <circle cx="178" cy="24" r="2.2"/>
    <circle cx="34"  cy="62" r="2.0"/>
    <circle cx="32"  cy="98" r="2.0"/>
    <circle cx="186" cy="62" r="2.0"/>
    <circle cx="188" cy="98" r="2.0"/>
  </g>

  <!-- Apex flare -->
  <g filter="url(#s-neon-md)">
    <circle cx="110" cy="12" r="10" fill="url(#s-apex)"/>
    <circle cx="110" cy="12" r="4"  fill="rgba(255,255,255,0.98)"/>
  </g>

</svg>
