<svg width="500" height="610" viewBox="0 0 500 610" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- ── Filters ─────────────────────────────────────────── -->
    <filter id="neon-xs"  x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="neon-sm"  x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="neon-md"  x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="neon-lg"  x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="neon-xl"  x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="text-glow" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- ── Clip path (shield interior) ───────────────────── -->
    <clipPath id="shield-clip">
      <path d="M 62 28 L 438 28 L 438 278 C 438 372 346 442 250 486 C 154 442 62 372 62 278 Z"/>
    </clipPath>

    <!-- ── Gradients ──────────────────────────────────────── -->
    <linearGradient id="metal" x1="250" y1="28" x2="250" y2="486" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#18363e"/>
      <stop offset="40%"  stop-color="#0d1f26"/>
      <stop offset="100%" stop-color="#050d10"/>
    </linearGradient>

    <radialGradient id="core-glow" cx="250" cy="257" r="130" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="rgba(186,250,237,0.50)"/>
      <stop offset="45%"  stop-color="rgba(45,212,191,0.14)"/>
      <stop offset="100%" stop-color="rgba(45,212,191,0)"/>
    </radialGradient>

    <radialGradient id="outer-halo" cx="250" cy="257" r="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="rgba(94,234,212,0.30)"/>
      <stop offset="55%"  stop-color="rgba(45,212,191,0.06)"/>
      <stop offset="100%" stop-color="rgba(45,212,191,0)"/>
    </radialGradient>

    <radialGradient id="apex-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="rgba(255,255,255,1)"/>
      <stop offset="50%"  stop-color="rgba(186,250,237,0.7)"/>
      <stop offset="100%" stop-color="rgba(94,234,212,0)"/>
    </radialGradient>

  </defs>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- Background constellation dots / lines                  -->
  <!-- ══════════════════════════════════════════════════════ -->
  <g opacity="0.55" stroke="rgba(45,212,191,0.45)" stroke-width="0.8">
    <line x1="20"  y1="80"  x2="80"  y2="40"/>
    <line x1="80"  y1="40"  x2="130" y2="95"/>
    <line x1="420" y1="40"  x2="480" y2="80"/>
    <line x1="370" y1="95"  x2="420" y2="40"/>
    <line x1="20"  y1="380" x2="55"  y2="430"/>
    <line x1="445" y1="430" x2="480" y2="380"/>
    <line x1="15"  y1="160" x2="55"  y2="200"/>
    <line x1="445" y1="200" x2="485" y2="160"/>
  </g>
  <g fill="rgba(94,234,212,0.80)">
    <circle cx="20"  cy="80"  r="2.2"/>
    <circle cx="80"  cy="40"  r="2.8"/>
    <circle cx="130" cy="95"  r="1.8"/>
    <circle cx="480" cy="80"  r="2.2"/>
    <circle cx="420" cy="40"  r="2.8"/>
    <circle cx="370" cy="95"  r="1.8"/>
    <circle cx="20"  cy="380" r="2.0"/>
    <circle cx="55"  cy="430" r="1.6"/>
    <circle cx="480" cy="380" r="2.0"/>
    <circle cx="445" cy="430" r="1.6"/>
    <circle cx="15"  cy="160" r="1.8"/>
    <circle cx="485" cy="160" r="1.8"/>
  </g>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- Outer halo glow behind shield                         -->
  <!-- ══════════════════════════════════════════════════════ -->
  <ellipse cx="250" cy="257" rx="210" ry="240" fill="url(#outer-halo)"/>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- Shield body (dark metallic fill)                      -->
  <!-- ══════════════════════════════════════════════════════ -->
  <path
    d="M 62 28 L 438 28 L 438 278 C 438 372 346 442 250 486 C 154 442 62 372 62 278 Z"
    fill="url(#metal)"
  />

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- All shield interior content — clipped                 -->
  <!-- ══════════════════════════════════════════════════════ -->
  <g clip-path="url(#shield-clip)">

    <!-- Core radial glow behind cross -->
    <ellipse cx="250" cy="257" rx="120" ry="135" fill="url(#core-glow)"/>

    <!-- ── Central neon cross ─────────────────────────────── -->
    <g filter="url(#neon-lg)">
      <!-- Vertical bar -->
      <rect x="234" y="28"  width="32" height="458" rx="4" fill="rgba(94,234,212,0.25)"/>
      <rect x="239" y="28"  width="22" height="458" rx="3" fill="#bafaed"/>
      <rect x="243" y="28"  width="14" height="458" rx="2" fill="#5eead4"/>
      <!-- Horizontal bar -->
      <rect x="62"  y="196" width="376" height="30"  rx="4" fill="rgba(94,234,212,0.25)"/>
      <rect x="62"  y="200" width="376" height="22"  rx="3" fill="#bafaed"/>
      <rect x="62"  y="204" width="376" height="14"  rx="2" fill="#5eead4"/>
    </g>

    <!-- ── Cross-pattée helper (reused via transform) ───── -->
    <!-- Shape: M -s,-2.8s L s,-2.8s L .22s,-s L 2.8s,-s L 2.8s,s L .22s,s L s,2.8s L -s,2.8s L -.22s,s L -2.8s,s L -2.8s,-s L -.22s,-s Z -->

    <!-- ── TOP-LEFT QUADRANT ─────────────────────────────── -->
    <!-- teal-tinted crosses -->
    <g fill="rgba(8,20,30,0.95)" stroke="rgba(45,212,191,0.85)" stroke-width="1.1" filter="url(#neon-xs)">
      <!-- cross 1 - large, top center of TL -->
      <g transform="translate(148,82)">
        <path d="M -8,-24 L 8,-24 L 5.5,-8 L 24,-8 L 24,8 L 5.5,8 L 8,24 L -8,24 L -5.5,8 L -24,8 L -24,-8 L -5.5,-8 Z"/>
      </g>
      <!-- cross 2 - medium, upper-left of TL -->
      <g transform="translate(100,128)">
        <path d="M -6,-18 L 6,-18 L 4,-6 L 18,-6 L 18,6 L 4,6 L 6,18 L -6,18 L -4,6 L -18,6 L -18,-6 L -4,-6 Z"/>
      </g>
      <!-- cross 3 - small, center-left -->
      <g transform="translate(160,138)" stroke="rgba(45,212,191,0.60)" stroke-width="0.9">
        <path d="M -5,-14 L 5,-14 L 3.5,-5 L 14,-5 L 14,5 L 3.5,5 L 5,14 L -5,14 L -3.5,5 L -14,5 L -14,-5 L -3.5,-5 Z"/>
      </g>
      <!-- cross 4 - medium, lower-left of TL -->
      <g transform="translate(118,168)">
        <path d="M -6,-18 L 6,-18 L 4,-6 L 18,-6 L 18,6 L 4,6 L 6,18 L -6,18 L -4,6 L -18,6 L -18,-6 L -4,-6 Z"/>
      </g>
    </g>

    <!-- ── TOP-RIGHT QUADRANT ────────────────────────────── -->
    <!-- silver/gold-tinted crosses -->
    <g fill="rgba(10,22,32,0.95)" stroke="rgba(180,200,230,0.70)" stroke-width="1.1" filter="url(#neon-xs)">
      <!-- cross 1 - large -->
      <g transform="translate(352,82)">
        <path d="M -8,-24 L 8,-24 L 5.5,-8 L 24,-8 L 24,8 L 5.5,8 L 8,24 L -8,24 L -5.5,8 L -24,8 L -24,-8 L -5.5,-8 Z"/>
      </g>
      <!-- cross 2 - medium, gold tint -->
      <g stroke="rgba(200,175,100,0.65)">
        <g transform="translate(400,128)">
          <path d="M -6,-18 L 6,-18 L 4,-6 L 18,-6 L 18,6 L 4,6 L 6,18 L -6,18 L -4,6 L -18,6 L -18,-6 L -4,-6 Z"/>
        </g>
      </g>
      <!-- cross 3 - small -->
      <g transform="translate(300,138)" stroke="rgba(180,200,230,0.50)" stroke-width="0.9">
        <path d="M -5,-14 L 5,-14 L 3.5,-5 L 14,-5 L 14,5 L 3.5,5 L 5,14 L -5,14 L -3.5,5 L -14,5 L -14,-5 L -3.5,-5 Z"/>
      </g>
      <!-- cross 4 - medium, silver -->
      <g transform="translate(382,168)">
        <path d="M -6,-18 L 6,-18 L 4,-6 L 18,-6 L 18,6 L 4,6 L 6,18 L -6,18 L -4,6 L -18,6 L -18,-6 L -4,-6 Z"/>
      </g>
    </g>

    <!-- ── BOTTOM-LEFT QUADRANT ──────────────────────────── -->
    <g fill="rgba(8,20,30,0.95)" stroke="rgba(45,212,191,0.75)" stroke-width="1.1" filter="url(#neon-xs)">
      <!-- cross 1 -->
      <g transform="translate(140,262)">
        <path d="M -8,-24 L 8,-24 L 5.5,-8 L 24,-8 L 24,8 L 5.5,8 L 8,24 L -8,24 L -5.5,8 L -24,8 L -24,-8 L -5.5,-8 Z"/>
      </g>
      <!-- cross 2 -->
      <g transform="translate(100,330)" stroke="rgba(45,212,191,0.55)">
        <path d="M -6,-18 L 6,-18 L 4,-6 L 18,-6 L 18,6 L 4,6 L 6,18 L -6,18 L -4,6 L -18,6 L -18,-6 L -4,-6 Z"/>
      </g>
      <!-- cross 3 - small -->
      <g transform="translate(165,345)" stroke="rgba(45,212,191,0.45)" stroke-width="0.9">
        <path d="M -5,-14 L 5,-14 L 3.5,-5 L 14,-5 L 14,5 L 3.5,5 L 5,14 L -5,14 L -3.5,5 L -14,5 L -14,-5 L -3.5,-5 Z"/>
      </g>
    </g>

    <!-- ── BOTTOM-RIGHT QUADRANT ─────────────────────────── -->
    <g fill="rgba(10,22,32,0.95)" stroke="rgba(180,200,230,0.65)" stroke-width="1.1" filter="url(#neon-xs)">
      <!-- cross 1 -->
      <g transform="translate(360,262)">
        <path d="M -8,-24 L 8,-24 L 5.5,-8 L 24,-8 L 24,8 L 5.5,8 L 8,24 L -8,24 L -5.5,8 L -24,8 L -24,-8 L -5.5,-8 Z"/>
      </g>
      <!-- cross 2 - gold -->
      <g stroke="rgba(200,175,100,0.60)">
        <g transform="translate(400,330)">
          <path d="M -6,-18 L 6,-18 L 4,-6 L 18,-6 L 18,6 L 4,6 L 6,18 L -6,18 L -4,6 L -18,6 L -18,-6 L -4,-6 Z"/>
        </g>
      </g>
      <!-- cross 3 - small silver -->
      <g transform="translate(300,345)" stroke="rgba(180,200,230,0.45)" stroke-width="0.9">
        <path d="M -5,-14 L 5,-14 L 3.5,-5 L 14,-5 L 14,5 L 3.5,5 L 5,14 L -5,14 L -3.5,5 L -14,5 L -14,-5 L -3.5,-5 Z"/>
      </g>
    </g>

  </g><!-- end clip -->

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- Shield border — bright neon teal outline              -->
  <!-- ══════════════════════════════════════════════════════ -->
  <!-- Wide diffuse outer glow -->
  <path
    d="M 62 28 L 438 28 L 438 278 C 438 372 346 442 250 486 C 154 442 62 372 62 278 Z"
    fill="none" stroke="rgba(94,234,212,0.25)" stroke-width="18"
    filter="url(#neon-xl)"
  />
  <!-- Mid glow -->
  <path
    d="M 62 28 L 438 28 L 438 278 C 438 372 346 442 250 486 C 154 442 62 372 62 278 Z"
    fill="none" stroke="rgba(94,234,212,0.65)" stroke-width="6"
    filter="url(#neon-md)"
  />
  <!-- Crisp bright inner line -->
  <path
    d="M 62 28 L 438 28 L 438 278 C 438 372 346 442 250 486 C 154 442 62 372 62 278 Z"
    fill="none" stroke="rgba(186,250,237,0.95)" stroke-width="2.5"
  />

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- Inner bevel ring                                      -->
  <!-- ══════════════════════════════════════════════════════ -->
  <path
    d="M 78 44 L 422 44 L 422 277 C 422 363 338 428 250 469 C 162 428 78 363 78 277 Z"
    fill="none" stroke="rgba(94,234,212,0.30)" stroke-width="1.2"
  />

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- Rivets along top inner edge                           -->
  <!-- ══════════════════════════════════════════════════════ -->
  <g fill="#8ab5c0" stroke="#1a3840" stroke-width="0.5">
    <circle cx="95"  cy="55" r="3.2"/>
    <circle cx="130" cy="50" r="3.2"/>
    <circle cx="170" cy="47" r="3.2"/>
    <circle cx="210" cy="46" r="3.2"/>
    <circle cx="250" cy="45" r="3.2"/>
    <circle cx="290" cy="46" r="3.2"/>
    <circle cx="330" cy="47" r="3.2"/>
    <circle cx="370" cy="50" r="3.2"/>
    <circle cx="405" cy="55" r="3.2"/>
    <!-- side rivets left -->
    <circle cx="74"  cy="100" r="3.0"/>
    <circle cx="70"  cy="155" r="3.0"/>
    <circle cx="68"  cy="210" r="3.0"/>
    <circle cx="72"  cy="265" r="3.0"/>
    <circle cx="83"  cy="316" r="3.0"/>
    <circle cx="104" cy="362" r="3.0"/>
    <circle cx="135" cy="402" r="3.0"/>
    <circle cx="174" cy="434" r="3.0"/>
    <circle cx="218" cy="456" r="3.0"/>
    <!-- side rivets right -->
    <circle cx="426" cy="100" r="3.0"/>
    <circle cx="430" cy="155" r="3.0"/>
    <circle cx="432" cy="210" r="3.0"/>
    <circle cx="428" cy="265" r="3.0"/>
    <circle cx="417" cy="316" r="3.0"/>
    <circle cx="396" cy="362" r="3.0"/>
    <circle cx="365" cy="402" r="3.0"/>
    <circle cx="326" cy="434" r="3.0"/>
    <circle cx="282" cy="456" r="3.0"/>
    <circle cx="250" cy="465" r="3.0"/>
  </g>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- Apex flare — bright point at top center               -->
  <!-- ══════════════════════════════════════════════════════ -->
  <g filter="url(#neon-lg)">
    <circle cx="250" cy="28" r="18" fill="url(#apex-grad)"/>
    <circle cx="250" cy="28" r="7"  fill="rgba(255,255,255,0.98)"/>
  </g>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- Wordmark                                              -->
  <!-- ══════════════════════════════════════════════════════ -->
  <text
    x="250" y="545"
    text-anchor="middle"
    font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
    font-size="82" font-weight="900"
    letter-spacing="6"
    fill="#ffffff"
    filter="url(#text-glow)"
  >ARKHE</text>

  <text
    x="250" y="592"
    text-anchor="middle"
    font-family="'Arial','Helvetica Neue',Arial,sans-serif"
    font-size="22" font-weight="500"
    letter-spacing="14"
    fill="rgba(94,234,212,0.92)"
    filter="url(#neon-xs)"
  >HOLDINGS</text>

</svg>
