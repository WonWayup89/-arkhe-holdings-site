<svg width="420" height="520" viewBox="0 0 420 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Shield metal fill -->
    <linearGradient id="lgo-metal" x1="210" y1="30" x2="210" y2="370" gradientUnits="userSpaceOnUse">
      <stop offset="0%"  stop-color="#1a3840"/>
      <stop offset="45%" stop-color="#0c1e22"/>
      <stop offset="100%" stop-color="#050e10"/>
    </linearGradient>

    <!-- Bevel stroke -->
    <linearGradient id="lgo-bevel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#7fffed"/>
      <stop offset="40%"  stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#0d6e66"/>
    </linearGradient>

    <!-- Core glow behind cross -->
    <radialGradient id="lgo-core" cx="50%" cy="50%" r="55%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="rgba(186,250,237,0.55)"/>
      <stop offset="55%"  stop-color="rgba(45,212,191,0.12)"/>
      <stop offset="100%" stop-color="rgba(45,212,191,0)"/>
    </radialGradient>

    <!-- Outer halo glow -->
    <radialGradient id="lgo-halo" cx="50%" cy="48%" r="52%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="rgba(94,234,212,0.40)"/>
      <stop offset="60%"  stop-color="rgba(45,212,191,0.08)"/>
      <stop offset="100%" stop-color="rgba(45,212,191,0)"/>
    </radialGradient>

    <!-- Apex bright spot -->
    <radialGradient id="lgo-apex" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="rgba(255,255,255,1)"/>
      <stop offset="40%"  stop-color="rgba(186,250,237,0.6)"/>
      <stop offset="100%" stop-color="rgba(94,234,212,0)"/>
    </radialGradient>

    <!-- Neon soft glow filter -->
    <filter id="lgo-neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Strong neon (cross bars) -->
    <filter id="lgo-neon-strong" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Full-shield glow drop-shadow -->
    <filter id="lgo-shield-glow" x="-25%" y="-20%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Outer halo circle behind shield                    -->
  <!-- ═══════════════════════════════════════════════════ -->
  <ellipse cx="210" cy="210" rx="175" ry="185" fill="url(#lgo-halo)"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Shield body                                        -->
  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Main fill (dark metal) -->
  <path
    d="M 55 45 L 365 45 L 365 210 C 365 295 315 355 210 400 C 105 355 55 295 55 210 Z"
    fill="url(#lgo-metal)"
    stroke="url(#lgo-bevel)"
    stroke-width="3.5"
    filter="url(#lgo-shield-glow)"
  />

  <!-- Bevel ring 1 -->
  <path
    d="M 70 60 L 350 60 L 350 210 C 350 288 305 344 210 386 C 115 344 70 288 70 210 Z"
    fill="none"
    stroke="rgba(94,234,212,0.50)"
    stroke-width="1.5"
    filter="url(#lgo-neon)"
  />

  <!-- Bevel ring 2 (subtle) -->
  <path
    d="M 82 72 L 338 72 L 338 209 C 338 281 298 333 210 372 C 122 333 82 281 82 209 Z"
    fill="none"
    stroke="rgba(94,234,212,0.20)"
    stroke-width="0.9"
  />

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Rivets                                             -->
  <!-- ═══════════════════════════════════════════════════ -->
  <g fill="#9ab8c0" stroke="#1e3c42" stroke-width="0.5">
    <!-- top row -->
    <circle cx="96"  cy="84"  r="2.8"/>
    <circle cx="128" cy="84"  r="2.8"/>
    <circle cx="162" cy="84"  r="2.8"/>
    <circle cx="210" cy="84"  r="2.8"/>
    <circle cx="258" cy="84"  r="2.8"/>
    <circle cx="292" cy="84"  r="2.8"/>
    <circle cx="324" cy="84"  r="2.8"/>
    <!-- left edge -->
    <circle cx="85"  cy="118" r="2.8"/>
    <circle cx="82"  cy="158" r="2.8"/>
    <circle cx="82"  cy="200" r="2.8"/>
    <circle cx="86"  cy="242" r="2.8"/>
    <circle cx="98"  cy="284" r="2.8"/>
    <circle cx="118" cy="324" r="2.8"/>
    <circle cx="148" cy="358" r="2.8"/>
    <circle cx="185" cy="382" r="2.8"/>
    <!-- right edge -->
    <circle cx="335" cy="118" r="2.8"/>
    <circle cx="338" cy="158" r="2.8"/>
    <circle cx="338" cy="200" r="2.8"/>
    <circle cx="334" cy="242" r="2.8"/>
    <circle cx="322" cy="284" r="2.8"/>
    <circle cx="302" cy="324" r="2.8"/>
    <circle cx="272" cy="358" r="2.8"/>
    <circle cx="235" cy="382" r="2.8"/>
    <circle cx="210" cy="390" r="2.8"/>
  </g>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Soft core glow behind cross                        -->
  <!-- ═══════════════════════════════════════════════════ -->
  <ellipse cx="210" cy="222" rx="100" ry="120" fill="url(#lgo-core)" opacity="0.95"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Central neon cross                                 -->
  <!-- ═══════════════════════════════════════════════════ -->
  <g filter="url(#lgo-neon-strong)">
    <!-- Vertical bar — outer halo -->
    <rect x="196" y="80" width="28" height="296" rx="4" fill="rgba(94,234,212,0.28)"/>
    <!-- Vertical bar — white core -->
    <rect x="202" y="84" width="16" height="288" rx="3" fill="#bafaed"/>
    <!-- Vertical bar — teal inner -->
    <rect x="206" y="88" width="8"  height="280" rx="2" fill="#5eead4"/>

    <!-- Horizontal bar — outer halo -->
    <rect x="90"  y="200" width="240" height="28" rx="4" fill="rgba(94,234,212,0.28)"/>
    <!-- Horizontal bar — white core -->
    <rect x="94"  y="204" width="232" height="20" rx="3" fill="#bafaed"/>
    <!-- Horizontal bar — teal inner -->
    <rect x="98"  y="208" width="224" height="12" rx="2" fill="#5eead4"/>
  </g>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Four cross-pattée crusader crosses in quadrants    -->
  <!-- ═══════════════════════════════════════════════════ -->
  <g stroke="rgba(94,234,212,0.90)" stroke-width="1.2" filter="url(#lgo-neon)">
    <!-- top-left -->
    <g transform="translate(148, 152)" fill="rgba(8,22,26,0.95)">
      <path d="M -7,-20 L 7,-20 L 5,-7 L 20,-7 L 20,7 L 5,7 L 7,20 L -7,20 L -5,7 L -20,7 L -20,-7 L -5,-7 Z"/>
    </g>
    <!-- top-right -->
    <g transform="translate(272, 152)" fill="rgba(8,22,26,0.95)">
      <path d="M -7,-20 L 7,-20 L 5,-7 L 20,-7 L 20,7 L 5,7 L 7,20 L -7,20 L -5,7 L -20,7 L -20,-7 L -5,-7 Z"/>
    </g>
    <!-- bottom-left -->
    <g transform="translate(148, 292)" fill="rgba(8,22,26,0.95)">
      <path d="M -7,-20 L 7,-20 L 5,-7 L 20,-7 L 20,7 L 5,7 L 7,20 L -7,20 L -5,7 L -20,7 L -20,-7 L -5,-7 Z"/>
    </g>
    <!-- bottom-right -->
    <g transform="translate(272, 292)" fill="rgba(8,22,26,0.95)">
      <path d="M -7,-20 L 7,-20 L 5,-7 L 20,-7 L 20,7 L 5,7 L 7,20 L -7,20 L -5,7 L -20,7 L -20,-7 L -5,-7 Z"/>
    </g>
  </g>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Apex flare — bright point at top of shield         -->
  <!-- ═══════════════════════════════════════════════════ -->
  <g filter="url(#lgo-neon-strong)">
    <circle cx="210" cy="45" r="16" fill="url(#lgo-apex)"/>
    <circle cx="210" cy="45" r="7"  fill="rgba(255,255,255,0.95)"/>
  </g>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Wordmark: ARKHE HOLDINGS                           -->
  <!-- ═══════════════════════════════════════════════════ -->
  <text
    x="210"
    y="450"
    text-anchor="middle"
    font-family="'Segoe UI', 'Arial', 'Helvetica Neue', sans-serif"
    font-size="68"
    font-weight="800"
    letter-spacing="8"
    fill="#ffffff"
    filter="url(#lgo-neon)"
  >ARKHE</text>

  <text
    x="210"
    y="500"
    text-anchor="middle"
    font-family="'Segoe UI', 'Arial', 'Helvetica Neue', sans-serif"
    font-size="24"
    font-weight="500"
    letter-spacing="12"
    fill="rgba(94,234,212,0.90)"
    filter="url(#lgo-neon)"
  >HOLDINGS</text>
</svg>
